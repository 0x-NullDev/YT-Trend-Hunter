name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22"

jobs:
  # ─── BACKEND TESTS ─────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yt_trend_hunter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: |
          cd backend
          ruff check app/ tests/ || true

      - name: Run tests with pytest
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing -x --timeout=60
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/yt_trend_hunter_test
          DATABASE_SYNC_URL: postgresql://postgres:postgres@localhost:5432/yt_trend_hunter_test
          REDIS_URL: redis://localhost:6379/0
          YOUTUBE_API_KEY: test_key
          DEEPSEEK_API_KEY: test_key
          OPENAI_API_KEY: test_key
          ANTHROPIC_API_KEY: test_key
          APP_SECRET_KEY: test-secret-key-for-ci
          APP_ENV: testing
          APP_DEBUG: "false"
          REDDIT_CLIENT_ID: test
          REDDIT_CLIENT_SECRET: test
          NEWS_API_KEY: test
          GOOGLE_TRENDS_ENABLED: "false"
          SCHEDULER_ENABLED: "false"
          ALERTS_ENABLED: "false"
          RATE_LIMIT_ENABLED: "false"
          ELASTICSEARCH_HOSTS: ""
          AI_DEFAULT_PROVIDER: deepseek

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.xml
          fail_ci_if_error: false

  # ─── FRONTEND TESTS ────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint || true

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ─── DOCKER BUILD ──────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: yt-trend-hunter-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: yt-trend-hunter-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── DEPLOY (main branch only) ─────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deployment would be configured here"
          # Example deployment commands:
          # - Deploy to Railway: railway up
          # - Deploy to Render: render deploy
          # - Deploy to VPS: rsync + docker-compose up
          # - Deploy to AWS: ecs deploy
